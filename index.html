<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hit Me Camera App</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background: radial-gradient(circle at top, #0f172a, #000);
  color:white;
  text-align:center;
}

h2{
  margin-top:15px;
}

/* MAIN BUTTON */
.btn{
  margin:20px;
  padding:18px 40px;
  font-size:20px;
  font-weight:bold;
  border:none;
  border-radius:14px;
  cursor:pointer;

  background: linear-gradient(135deg,#ff00cc,#00f5ff,#ffcc00);
  background-size:300% 300%;
  animation: move 4s infinite linear;
}

.btn:active{
  transform: scale(0.92);
}

@keyframes move{
  0%{background-position:0%}
  100%{background-position:100%}
}

/* FEED */
#feed{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
  padding:20px;
}

img{
  width:160px;
  border-radius:10px;
  border:2px solid white;
}

/* FLASH */
.flash{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:white;
  opacity:0;
  pointer-events:none;
  transition:0.2s;
  z-index:999;
}

/* SMALL SMILE BUTTON */
#viewBtn{
  position:fixed;
  bottom:20px;
  left:20px;

  width:38px;
  height:38px;
  border-radius:50%;

  display:flex;
  align-items:center;
  justify-content:center;

  font-size:16px;
  border:none;
  cursor:pointer;

  background: linear-gradient(135deg,#ff00cc,#00f5ff);
  color:white;

  box-shadow:0 8px 15px rgba(0,0,0,0.5);
}

#viewBtn:active{
  transform:scale(0.9);
}

/* MODAL */
#galleryModal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  display:none;
  flex-wrap:wrap;
  justify-content:center;
  align-items:center;
  overflow:auto;
  z-index:999;
}

#galleryModal img{
  width:180px;
  margin:10px;
  border-radius:10px;
}

/* HIDE RIGHT CORNER FEED COMPLETELY */
#cornerFeed{
  display:none;
}

canvas, video{display:none;}
</style>
</head>

<body>

<h2>🔥 Hit Me Camera App</h2>

<button class="btn" onclick="takePhoto()">🔥 HIT ME 💥</button>

<button id="viewBtn" onclick="openGallery()">😊</button>

<div id="feed"></div>
<div id="cornerFeed"></div>

<div id="galleryModal" onclick="closeGallery()"></div>
<div class="flash" id="flash"></div>

<audio id="shutterSound" src="https://www.soundjay.com/camera/sounds/camera-shutter-click-01.mp3"></audio>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_AUTH_DOMAIN",
  projectId: "YOUR_PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let allPhotos = [];

/* TAKE PHOTO */
async function takePhoto(){

  const sound = document.getElementById("shutterSound");
  sound.currentTime = 0;
  sound.play();

  const flash = document.getElementById("flash");
  flash.style.opacity = "1";
  setTimeout(()=>flash.style.opacity="0",150);

  const stream = await navigator.mediaDevices.getUserMedia({video:true});
  const video = document.createElement("video");
  video.srcObject = stream;

  await video.play();
  await new Promise(r=>setTimeout(r,500));

  const canvas = document.createElement("canvas");
  canvas.width = 640;
  canvas.height = 480;

  const ctx = canvas.getContext("2d");
  ctx.drawImage(video,0,0,640,480);

  stream.getTracks().forEach(t=>t.stop());

  const image = canvas.toDataURL("image/png");

  render(image);
  saveOffline(image);

  if(navigator.onLine){
    try{
      await addDoc(collection(db,"photos"),{
        image,
        time: Date.now()
      });
    }catch(e){}
  }
}

/* RENDER */
function render(image){
  allPhotos.unshift(image);

  const feed = document.getElementById("feed");
  const img = document.createElement("img");
  img.src = image;
  feed.prepend(img);
}

/* OFFLINE */
function saveOffline(image){
  let photos = JSON.parse(localStorage.getItem("photos") || "[]");
  photos.unshift(image);
  localStorage.setItem("photos", JSON.stringify(photos));
}

/* GALLERY */
function openGallery(){
  const modal = document.getElementById("galleryModal");
  modal.innerHTML = "";

  allPhotos.forEach(img=>{
    const i = document.createElement("img");
    i.src = img;
    modal.appendChild(i);
  });

  modal.style.display = "flex";
}

function closeGallery(){
  document.getElementById("galleryModal").style.display = "none";
}

/* FIRESTORE LIVE */
const q = query(collection(db,"photos"), orderBy("time","desc"));

onSnapshot(q,(snap)=>{
  snap.forEach(doc=>{
    render(doc.data().image);
  });
});

/* LOAD OFFLINE */
window.onload = ()=>{
  let photos = JSON.parse(localStorage.getItem("photos") || "[]");
  photos.forEach(render);
};

window.takePhoto = takePhoto;
window.openGallery = openGallery;
window.closeGallery = closeGallery;

</script>

</body>
</html>
