<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hit Me Camera Button</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  background: radial-gradient(circle at top, #0f172a, #000);
  font-family: Arial;
}

/* BUTTON */
.btn{
  padding: 22px 70px;
  font-size: 28px;
  font-weight: 900;
  letter-spacing: 2px;
  color: white;
  border: none;
  border-radius: 16px;
  cursor: pointer;

  background: linear-gradient(135deg, #ff00cc, #ff4d4d, #00f5ff);
  background-size: 300% 300%;
  animation: gradientMove 4s ease infinite;

  box-shadow:
    0 10px 0 #0a0a0a,
    0 18px 35px rgba(0,0,0,0.6),
    0 0 20px rgba(255,0,200,0.6),
    0 0 40px rgba(0,255,255,0.4);

  transform: translateY(0);
  transition: 0.15s ease;

  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

.btn:active{
  transform: translateY(6px) scale(0.97);
}

/* preview image */
#previewImg{
  margin-top: 25px;
  max-width: 300px;
  border-radius: 15px;
  border: 3px solid white;
  box-shadow: 0 10px 30px rgba(0,0,0,0.6);
}

/* animation */
@keyframes gradientMove{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}
</style>
</head>

<body>

<button class="btn" onclick="startCamera()">🔥 HIT ME 💥</button>

<script>
async function startCamera(){
  try{
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "user" }
    });

    const video = document.createElement("video");
    video.srcObject = stream;
    await video.play();

    const canvas = document.createElement("canvas");
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    const ctx = canvas.getContext("2d");
    ctx.drawImage(video, 0, 0);

    // stop camera
    stream.getTracks().forEach(t => t.stop());

    // show preview (NO DOWNLOAD)
    let img = document.getElementById("previewImg");

    if(!img){
      img = document.createElement("img");
      img.id = "previewImg";
      document.body.appendChild(img);
    }

    img.src = canvas.toDataURL("image/png");

  } catch(err){
    alert("Camera permission allow karo ya HTTPS/localhost use karo");
  }
}
</script>

</body>
</html>
