<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hit Me Live Camera</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background: radial-gradient(circle at top, #0f172a, #000);
  color:white;
  text-align:center;
}

h2{
  margin-top:20px;
}

.btn{
  margin:20px;
  padding:18px 40px;
  font-size:20px;
  font-weight:bold;
  border:none;
  border-radius:14px;
  cursor:pointer;

  background: linear-gradient(135deg,#ff00cc,#00f5ff,#ffcc00);
  background-size:300% 300%;
  animation: move 4s infinite linear;

  box-shadow:0 10px 25px rgba(0,0,0,0.6);
  -webkit-tap-highlight-color: transparent;
  transition:0.2s;
}

.btn:active{
  transform: scale(0.92);
}

@keyframes move{
  0%{background-position:0%}
  100%{background-position:100%}
}

#feed{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
  padding:20px;
}

img{
  width:160px;
  border-radius:10px;
  border:2px solid white;
  box-shadow:0 10px 20px rgba(0,0,0,0.5);
}

canvas, video{display:none;}
</style>
</head>

<body>

<h2>🔥 Live Hit Me Photo Feed</h2>

<button class="btn" onclick="takePhoto()">🔥 HIT ME 💥</button>

<div id="feed"></div>

<!-- 🔊 SHUTTER SOUND -->
<audio id="shutterSound" src="https://www.soundjay.com/camera/sounds/camera-shutter-click-01.mp3"></audio>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";


// 🔥 YOUR FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyASqGv3I5dTPTFmTSrghmosOOHGu_Ob2m0",
  authDomain: "photo-app-e4b79.firebaseapp.com",
  projectId: "photo-app-e4b79",
  appId: "1:99786646752:web:4c9747ab181cf813a11c85"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


// 📸 TAKE PHOTO FUNCTION
async function takePhoto(){
  try{

    // 🔊 shutter sound
    const sound = document.getElementById("shutterSound");
    sound.currentTime = 0;
    sound.play();

    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "user" }
    });

    const video = document.createElement("video");
    video.srcObject = stream;

    await video.play();

    // ⚡ important delay fix
    await new Promise(r => setTimeout(r, 500));

    const canvas = document.createElement("canvas");
    canvas.width = 640;
    canvas.height = 480;

    const ctx = canvas.getContext("2d");
    ctx.drawImage(video,0,0,640,480);

    stream.getTracks().forEach(t => t.stop());

    const image = canvas.toDataURL("image/png");

    await addDoc(collection(db,"photos"),{
      image,
      time: Date.now()
    });

  } catch(err){
    alert("Camera error: " + err.message);
    console.log(err);
  }
}


// 🔥 LIVE FEED
const q = query(collection(db,"photos"), orderBy("time","desc"));

onSnapshot(q,(snap)=>{
  const feed = document.getElementById("feed");
  feed.innerHTML = "";

  snap.forEach(doc=>{
    const img = document.createElement("img");
    img.src = doc.data().image;
    feed.appendChild(img);
  });
});

window.takePhoto = takePhoto;

</script>

</body>
</html>
