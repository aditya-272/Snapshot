<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snap Admin Camera App</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background: radial-gradient(circle at top, #0f172a, #000);
  color:white;
  text-align:center;
}

/* MAIN BUTTON */
.btn{
  margin:20px;
  padding:18px 40px;
  font-size:20px;
  font-weight:bold;
  border:none;
  border-radius:14px;
  cursor:pointer;
  background: linear-gradient(135deg,#ff00cc,#00f5ff,#ffcc00);
  background-size:300% 300%;
  animation: move 4s infinite linear;
}

@keyframes move{
  0%{background-position:0%}
  100%{background-position:100%}
}

/* HIDE MAIN FEED */
#feed{
  display:none;
}

/* FLASH */
.flash{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:white;
  opacity:0;
  transition:0.2s;
  pointer-events:none;
}

/* GALLERY */
#galleryModal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  display:none;
  flex-wrap:wrap;
  justify-content:center;
  align-items:center;
  overflow:auto;
  z-index:999;
}

#galleryModal img{
  width:160px;
  margin:10px;
  border-radius:10px;
}

/* ADMIN BUTTON */
#adminBtn{
  position:fixed;
  bottom:15px;
  right:15px;
  width:45px;
  height:45px;
  border-radius:50%;
  border:none;
  font-size:18px;
  background:#ff00cc;
  color:white;
  cursor:pointer;
  box-shadow:0 0 10px rgba(0,0,0,0.5);
}
</style>
</head>

<body>

<h2>🔥 Snap Camera App</h2>

<button class="btn" onclick="takePhoto()">🔥 HIT ME 💥</button>

<button class="btn" onclick="openGallery()">😊</button>

<button id="adminBtn" onclick="askPassword()">⚙️</button>

<div id="galleryModal"></div>
<div class="flash" id="flash"></div>

<audio id="shutterSound" src="https://www.soundjay.com/camera/sounds/camera-shutter-click-01.mp3"></audio>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, orderBy }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_AUTH_DOMAIN",
  projectId: "YOUR_PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let allPhotos = [];

/* CAMERA */
async function takePhoto(){

  const sound = document.getElementById("shutterSound");
  sound.currentTime = 0;
  sound.play();

  const flash = document.getElementById("flash");
  flash.style.opacity = "1";
  setTimeout(()=>flash.style.opacity="0",150);

  const stream = await navigator.mediaDevices.getUserMedia({video:true});
  const video = document.createElement("video");
  video.srcObject = stream;

  await video.play();
  await new Promise(r=>setTimeout(r,500));

  const canvas = document.createElement("canvas");
  canvas.width = 640;
  canvas.height = 480;

  const ctx = canvas.getContext("2d");
  ctx.drawImage(video,0,0,640,480);

  stream.getTracks().forEach(t=>t.stop());

  const image = canvas.toDataURL("image/png");

  await addDoc(collection(db,"photos"),{
    image,
    time: Date.now()
  });
}

/* OPEN GALLERY */
async function openGallery(){

  allPhotos = [];

  const q = query(collection(db,"photos"), orderBy("time","desc"));
  const snap = await getDocs(q);

  snap.forEach(docSnap=>{
    allPhotos.push({
      id: docSnap.id,
      image: docSnap.data().image
    });
  });

  const modal = document.getElementById("galleryModal");
  modal.innerHTML = "";

  allPhotos.forEach(item=>{
    const img = document.createElement("img");
    img.src = item.image;

    modal.appendChild(img);
  });

  modal.style.display = "flex";
}

/* CLOSE */
function closeGallery(){
  document.getElementById("galleryModal").style.display = "none";
}

/* ADMIN PASSWORD */
const ADMIN_PASS = "snap123";

function askPassword(){
  const pass = prompt("Enter Admin Password:");

  if(pass === ADMIN_PASS){
    alert("Access Granted 🔓");
    openAdminPanel();
  } else {
    alert("Wrong Password ❌");
  }
}

/* ADMIN PANEL */
async function openAdminPanel(){

  const q = query(collection(db,"photos"), orderBy("time","desc"));
  const snap = await getDocs(q);

  const modal = document.getElementById("galleryModal");
  modal.innerHTML = "";

  snap.forEach(docSnap=>{
    const div = document.createElement("div");

    const img = document.createElement("img");
    img.src = docSnap.data().image;
    img.width = 160;

    const btn = document.createElement("button");
    btn.innerText = "DELETE";
    btn.style.display = "block";
    btn.style.margin = "5px auto";

    btn.onclick = async ()=>{
      await deleteDoc(doc(db,"photos",docSnap.id));
      openAdminPanel();
    };

    div.appendChild(img);
    div.appendChild(btn);
    modal.appendChild(div);
  });

  modal.style.display = "flex";
}

window.takePhoto = takePhoto;
window.openGallery = openGallery;
window.askPassword = askPassword;

</script>

</body>
</html>
